version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: hotel_postgres
    restart: always
    environment:
      POSTGRES_DB: hotel_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: